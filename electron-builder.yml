appId: com.videouniquer.pro
productName: VideoUniquer Pro
copyright: Copyright © 2026 VideoUniquer

# Не публикуем на GitHub Releases — файлы скачиваются из Actions Artifacts
publish: null

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - electron/**/*
  - package.json

extraResources:
  - from: resources/bin/win
    to: bin/win
    filter:
      - "**/*"
  - from: resources/bin/mac
    to: bin/mac
    filter:
      - "**/*"
  - from: resources/bin/linux
    to: bin/linux
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-Setup-${version}.${ext}"
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: VideoUniquer Pro

mac:
  target:
    - target: dmg
      arch:
        - universal
  artifactName: "${productName}-Setup-${version}-mac.${ext}"
  category: public.app-category.video
  # FFmpeg — отдельные бинарники arm64/x64, одинаковые в обеих сборках
  x64ArchFiles: "**/bin/mac/**"
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false

linux:
  target:
    - AppImage
  category: Video
